name: VTK Java Wrapper

on:
  push:
    branches: [ 'master', 'main', 'develop' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ 'master', 'main', 'develop' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  # JOGL version for the JOGL Swing/AWT component. 2.6.0 matches the version
  # VTK's own CI pins, so it's the version the maintainers test against.
  # Confirmed present on Maven Central (repo1.maven.org), which we fetch from
  # first; jogamp.org is an unreliable-from-CI fallback.
  JOGL_VERSION: '2.6.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sysname: Linux
          - os: windows-latest
            sysname: Windows
          - os: macos-latest
            sysname: Darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          # VTK vendors third-party libs in-tree (not submodules), so recursive
          # checkout isn't strictly required, but it's harmless and future-proof.
          submodules: recursive

      - name: Setup Java JDK
        uses: actions/setup-java@v5.4.0
        with:
          # Aligned with the Zulu 25 JRE the downstream application bundles.
          # Note: VTK pins its wrapper classes to `--release 8` bytecode
          # regardless (VTK_JAVA_RELEASE_VERSION defaults to 8), so vtk.jar is
          # loadable by any JRE 8+; aligning the build JDK is for toolchain
          # tidiness and runtime parity, not to avoid UnsupportedClassVersionError.
          java-version: '25'
          distribution: 'zulu'
          java-package: 'jdk'

      # ----------------------------------------------------------------------
      # JOGL jars. VTK_JAVA_JOGL_COMPONENT=ON makes CMake SEND_ERROR at
      # configure time if it cannot find jogl-all-<ver>.jar and
      # gluegen-rt-<ver>.jar. FindJOGL.cmake searches Java_JAR_PATHS via
      # find_jar, matching NAMES "jogl-all"/"gluegen-rt" with the version
      # appended. We download both into a known dir and pass it through
      # -DJava_JAR_PATHS so the finder locates them.
      # ----------------------------------------------------------------------
      - name: Fetch JOGL jars
        shell: bash
        run: |
          set -euo pipefail
          dest="$GITHUB_WORKSPACE/jogl"
          mkdir -p "$dest"

          # Try each mirror in turn until both jars are fetched. Maven Central
          # is fast and reliable from GitHub runners; jogamp.org is the origin
          # but frequently times out from CI, so it's the fallback, not primary.
          central="https://repo1.maven.org/maven2/org/jogamp"
          jogamp="https://jogamp.org/deployment/maven/org/jogamp"

          fetch_one () {
            # $1 = output path, $2... = candidate URLs
            local out="$1"; shift
            local url
            for url in "$@"; do
              echo "Trying: $url"
              if curl -fL --connect-timeout 20 --retry 2 -o "$out" "$url"; then
                echo "  -> OK"
                return 0
              fi
              echo "  -> failed, trying next mirror"
            done
            return 1
          }

          fetch_one "$dest/jogl-all-${JOGL_VERSION}.jar" \
            "${central}/jogl/jogl-all/${JOGL_VERSION}/jogl-all-${JOGL_VERSION}.jar" \
            "${jogamp}/jogl/jogl-all/${JOGL_VERSION}/jogl-all-${JOGL_VERSION}.jar"

          fetch_one "$dest/gluegen-rt-${JOGL_VERSION}.jar" \
            "${central}/gluegen/gluegen-rt/${JOGL_VERSION}/gluegen-rt-${JOGL_VERSION}.jar" \
            "${jogamp}/gluegen/gluegen-rt/${JOGL_VERSION}/gluegen-rt-${JOGL_VERSION}.jar"

          echo "=== fetched ==="
          ls -l "$dest"
          # Sanity: both jars must be non-empty, or configure will SEND_ERROR.
          for f in "$dest/jogl-all-${JOGL_VERSION}.jar" "$dest/gluegen-rt-${JOGL_VERSION}.jar"; do
            if [ ! -s "$f" ]; then
              echo "FAIL: $f missing or empty after all mirrors." >&2
              exit 1
            fi
          done

      # System OpenGL headers/libs are needed for the Rendering group on Linux.
      # macOS ships OpenGL in a framework; Windows has opengl32 with the SDK.
      - name: Install OpenGL + X11 dev packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxt-dev libxrender-dev libxext-dev \
            libxcursor-dev p7zip-full

      - name: Install 7zip (macOS)
        if: runner.os == 'macOS'
        run: brew install p7zip

      # VTK's Java build has jar-timing handling that ONLY activates under the
      # Ninja generator (see Wrapping/Java/CMakeLists.txt: the vtkjava_jar
      # custom target is guarded by `if (CMAKE_GENERATOR MATCHES "Ninja")`).
      # Under the Visual Studio generator, INSTALL.vcxproj races vtk.jar
      # creation and fails with the paradoxical "cannot find ...: File exists".
      # So on Windows we build with Ninja + MSVC instead of the VS generator.
      # This step puts cl.exe/link.exe on PATH for the whole job.
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: |
          # On Windows use Ninja (see MSVC setup step above for why). Ninja is
          # preinstalled on GitHub Windows runners. Ninja is single-config, so
          # CMAKE_BUILD_TYPE drives the config there; the VS-style --config is
          # harmless-but-ignored under Ninja and used by multi-config elsewhere.
          GEN_ARGS=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            GEN_ARGS="-G Ninja"
          fi
          cmake -B build -S . $GEN_ARGS \
            -DVTK_BUILD_SHARED_LIBS=ON \
            -DVTK_ENABLE_KITS=ON \
            -DVTK_WRAP_JAVA=ON \
            -DVTK_JAVA_JOGL_COMPONENT=ON \
            -DJOGL_VERSION="${JOGL_VERSION}" \
            -DJOGL_EXTRA_VERSIONS="${JOGL_VERSION}" \
            -DJava_JAR_PATHS="${GITHUB_WORKSPACE}/jogl" \
            -DCMAKE_BUILD_TYPE=Release \
            -DVTK_BUILD_TESTING=OFF \
            -DVTK_BUILD_EXAMPLES=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_GROUP_ENABLE_StandAlone=YES \
            -DVTK_GROUP_ENABLE_Rendering=WANT \
            -DVTK_GROUP_ENABLE_Imaging=WANT \
            -DVTK_GROUP_ENABLE_Views=DONT_WANT \
            -DVTK_GROUP_ENABLE_Web=DONT_WANT \
            -DVTK_GROUP_ENABLE_Qt=DONT_WANT \
            -DVTK_GROUP_ENABLE_Parallel=DONT_WANT \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install_root"

      # Fail loudly if the dependent-option silently forced kits OFF (which
      # happens if VTK_BUILD_SHARED_LIBS didn't take). Without this you'd only
      # notice by counting 150 JNI libs at the end.
      - name: Assert kits are enabled
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q "^VTK_ENABLE_KITS:BOOL=ON" build/CMakeCache.txt; then
            echo "FAIL: VTK_ENABLE_KITS is not ON in the cache — kits were" >&2
            echo "force-disabled (likely VTK_BUILD_SHARED_LIBS is OFF)." >&2
            grep -E "VTK_ENABLE_KITS|VTK_BUILD_SHARED_LIBS" build/CMakeCache.txt >&2 || true
            exit 1
          fi
          echo "OK: kits enabled."

      - name: Build and install
        shell: bash
        # Bound parallelism to core count. VTK is large; a bare -j can exhaust
        # RAM on the 16 GB runners and get OOM-killed (exit 143). nproc is
        # Linux/Git-Bash; macOS uses sysctl; fall back to a constant.
        run: |
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)
          cmake --build build --target install --config Release -j "$JOBS"

      # Diagnostic: how many native libs did we actually produce? With kits on
      # this should be a small number (~9 kit JNI libs + a few unkitted +
      # bundled third-party), NOT ~150. Printed for visibility, not gated hard
      # (the exact count shifts with the module set).
      - name: Report native library count
        shell: bash
        run: |
          set -euo pipefail
          echo "=== JNI wrapper libs (*Java.*) ==="
          find install_root build \( -name '*Java.so' -o -name '*Java.so.*' \
            -o -name '*Java.dylib' -o -name '*Java.jnilib' -o -name '*Java.dll' \) \
            2>/dev/null | sort || true
          echo "=== all native libs under install_root ==="
          find install_root \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' \
            -o -name '*.dll' \) 2>/dev/null | wc -l
          echo "=== vtk.jar ==="
          find install_root build -name 'vtk.jar' 2>/dev/null || true

      # JNI-symbol presence gate — the Route-A analogue of your CoolProp JSON
      # symbol-leak gate. Whole-program consolidation (kits here) can silently
      # drop the Java_vtk_* entry points if link visibility is wrong; if they're
      # gone the jar loads but every native call throws UnsatisfiedLinkError at
      # runtime. Assert at least one kit JNI lib actually exports Java_ symbols.
      # nm-based → ELF/Mach-O only; Windows PE is skipped (same as your gate).
      - name: JNI symbol presence gate (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # Name-agnostic: find ANY JNI wrapper lib rather than assuming kit or
          # module names. VTK names JNI libs "<library_name>Java" and emits one
          # per wrapped module; extension is .so on Linux, .dylib or .jnilib on
          # macOS. We just need one that exports Java_* entry points to prove
          # the wrapper linkage is intact.
          #
          # NOTE: no `mapfile`/`readarray` here — those are Bash 4+ builtins and
          # macOS ships Bash 3.2. We collect matches into a plain loop instead,
          # counting and summing as we go, so it runs on both Bash versions.
          found=0
          total=0
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            found=$((found + 1))
            # nm format differs by platform:
            #   Linux (GNU nm):  "<addr> T Java_vtk..."   -D lists dynamic syms
            #   macOS (LLVM nm): "<addr> T _Java_vtk..."  Mach-O prepends '_',
            #                     and -D is not a macOS flag.
            # Use ONE nm invocation (fallback chain, not concatenation — running
            # two and concatenating would double-count). Match a 'T' text symbol
            # named Java_ OR _Java_ (optional leading underscore) so one pattern
            # works on both platforms.
            syms=$(nm -D "$lib" 2>/dev/null) || syms=""
            [ -n "$syms" ] || syms=$(nm -g "$lib" 2>/dev/null) || syms=""
            [ -n "$syms" ] || syms=$(nm "$lib" 2>/dev/null) || syms=""
            c=$(printf '%s\n' "$syms" | grep -Ec ' T _?Java_' || true)
            printf "  %-60s %s Java_ symbols\n" "$(basename "$lib")" "$c"
            total=$((total + c))
          done < <(find install_root build \
                     \( -name '*Java.so' -o -name '*Java.so.*' \
                        -o -name '*Java.dylib' -o -name '*Java.jnilib' \) \
                     -type f 2>/dev/null | sort -u)

          if [ "$found" -eq 0 ]; then
            echo "FAIL: no *Java JNI wrapper libs found at all." >&2
            echo "--- everything named *Java* under install_root/build ---" >&2
            find install_root build -name '*Java*' 2>/dev/null | head -50 >&2 || true
            echo "--- all native libs ---" >&2
            find install_root build \( -name '*.so' -o -name '*.so.*' \
              -o -name '*.dylib' -o -name '*.jnilib' \) 2>/dev/null | head -50 >&2 || true
            exit 1
          fi

          echo "Found $found JNI wrapper lib(s)."
          echo "Total Java_ entry points across all JNI libs: $total"
          if [ "$total" -eq 0 ]; then
            echo "FAIL: JNI libs exist but export no Java_* entry points —" >&2
            echo "native calls would throw UnsatisfiedLinkError at runtime." >&2
            exit 1
          fi
          echo "OK: JNI entry points present."

      - name: Upload per-OS artifact
        uses: actions/upload-artifact@v7
        with:
          name: vtk-java-${{ matrix.sysname }}
          # The whole install tree: native libs live under lib/java/... and the
          # jar under lib/java/. Uploading install_root keeps the layout intact.
          path: install_root

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Download per-OS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vtk-java-*
          path: staging

      # Assemble a single distributable tree:
      #   dist/vtk.jar                          (platform-independent; ship once)
      #   dist/natives/Linux/*.so
      #   dist/natives/Darwin/*.dylib
      #   dist/natives/Windows/*.dll
      # vtk.jar is pure Java and identical across OSes, so we keep one copy and
      # fail if the copies diverge (a sign the module set differed per-OS).
      - name: Assemble unified distribution
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/natives

          jar_hash=""
          for d in staging/vtk-java-*/; do
            sys="${d#staging/vtk-java-}"; sys="${sys%/}"

            # --- one shared vtk.jar ---
            found_jar=$(find "$d" -name 'vtk.jar' | head -1 || true)
            if [ -n "$found_jar" ]; then
              h=$(sha256sum "$found_jar" | cut -d' ' -f1)
              if [ -z "$jar_hash" ]; then
                jar_hash="$h"
                cp "$found_jar" dist/vtk.jar
              elif [ "$h" != "$jar_hash" ]; then
                echo "WARN: vtk.jar from $sys differs from the first one." >&2
                echo "      (module set may differ across platforms)" >&2
              fi
            fi

            # --- per-OS native libs ---
            mkdir -p "dist/natives/${sys}"
            find "$d" \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' \
              -o -name '*.jnilib' -o -name '*.dll' \) -type f \
              -exec cp {} "dist/natives/${sys}/" \; 2>/dev/null || true
          done

          echo "=== assembled distribution ==="
          find dist -type f | sort
          echo "=== native lib counts per platform ==="
          for p in dist/natives/*/; do
            printf "%s: %d libs\n" "$(basename "$p")" "$(find "$p" -type f | wc -l)"
          done

      - name: Upload unified VTK Java artifact
        uses: actions/upload-artifact@v7
        with:
          name: vtk-java-all-platforms
          path: dist

      - name: Delete intermediate per-OS artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: vtk-java-*
