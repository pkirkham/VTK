name: VTK Java Wrapper

on:
  push:
    branches: [ 'master', 'main', 'develop' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ 'master', 'main', 'develop' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  # JOGL version for the JOGL Swing/AWT component. 2.6.0 matches the version
  # VTK's own CI pins, so it's the version the maintainers test against.
  # Confirmed present on Maven Central (repo1.maven.org), which we fetch from
  # first; jogamp.org is an unreliable-from-CI fallback.
  JOGL_VERSION: '2.6.0'
  # Route the compiler through sccache. GHA backend stores the cache in the
  # GitHub Actions cache. NOTE: on VTK this currently gives near-zero hit rate
  # because a full VTK object set is far larger than GitHub's ~10 GB per-repo
  # cache budget across 3 platforms, so the cache thrashes/evicts. Kept in
  # place (harmless) in case a future setup — bigger cache, S3/R2 backend, or
  # fewer modules — makes it worthwhile. Not currently providing real speedup.
  SCCACHE_GHA_ENABLED: 'true'
  SCCACHE_CACHE_SIZE: '3G'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sysname: Linux
          - os: windows-latest
            sysname: Windows
          - os: macos-latest
            sysname: Darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          # VTK vendors third-party libs in-tree (not submodules), so recursive
          # checkout isn't strictly required, but it's harmless and future-proof.
          submodules: recursive

      - name: Setup Java JDK
        uses: actions/setup-java@v5.4.0
        with:
          # Aligned with the Zulu 25 JRE the downstream application bundles.
          # Note: VTK pins its wrapper classes to `--release 8` bytecode
          # regardless (VTK_JAVA_RELEASE_VERSION defaults to 8), so vtk.jar is
          # loadable by any JRE 8+; aligning the build JDK is for toolchain
          # tidiness and runtime parity, not to avoid UnsupportedClassVersionError.
          java-version: '25'
          distribution: 'zulu'
          java-package: 'jdk'

      # ----------------------------------------------------------------------
      # JOGL jars. VTK_JAVA_JOGL_COMPONENT=ON makes CMake SEND_ERROR at
      # configure time if it cannot find jogl-all-<ver>.jar and
      # gluegen-rt-<ver>.jar. FindJOGL.cmake searches Java_JAR_PATHS via
      # find_jar, matching NAMES "jogl-all"/"gluegen-rt" with the version
      # appended. We download both into a known dir and pass it through
      # -DJava_JAR_PATHS so the finder locates them.
      # ----------------------------------------------------------------------
      - name: Fetch JOGL jars
        shell: bash
        run: |
          set -euo pipefail
          dest="$GITHUB_WORKSPACE/jogl"
          mkdir -p "$dest"

          # Try each mirror in turn until both jars are fetched. Maven Central
          # is fast and reliable from GitHub runners; jogamp.org is the origin
          # but frequently times out from CI, so it's the fallback, not primary.
          central="https://repo1.maven.org/maven2/org/jogamp"
          jogamp="https://jogamp.org/deployment/maven/org/jogamp"

          fetch_one () {
            # $1 = output path, $2... = candidate URLs
            local out="$1"; shift
            local url
            for url in "$@"; do
              echo "Trying: $url"
              if curl -fL --connect-timeout 20 --retry 2 -o "$out" "$url"; then
                echo "  -> OK"
                return 0
              fi
              echo "  -> failed, trying next mirror"
            done
            return 1
          }

          fetch_one "$dest/jogl-all-${JOGL_VERSION}.jar" \
            "${central}/jogl/jogl-all/${JOGL_VERSION}/jogl-all-${JOGL_VERSION}.jar" \
            "${jogamp}/jogl/jogl-all/${JOGL_VERSION}/jogl-all-${JOGL_VERSION}.jar"

          fetch_one "$dest/gluegen-rt-${JOGL_VERSION}.jar" \
            "${central}/gluegen/gluegen-rt/${JOGL_VERSION}/gluegen-rt-${JOGL_VERSION}.jar" \
            "${jogamp}/gluegen/gluegen-rt/${JOGL_VERSION}/gluegen-rt-${JOGL_VERSION}.jar"

          echo "=== fetched ==="
          ls -l "$dest"
          # Sanity: both jars must be non-empty, or configure will SEND_ERROR.
          for f in "$dest/jogl-all-${JOGL_VERSION}.jar" "$dest/gluegen-rt-${JOGL_VERSION}.jar"; do
            if [ ! -s "$f" ]; then
              echo "FAIL: $f missing or empty after all mirrors." >&2
              exit 1
            fi
          done

      # System OpenGL headers/libs are needed for the Rendering group on Linux.
      # macOS ships OpenGL in a framework; Windows has opengl32 with the SDK.
      - name: Install OpenGL + X11 dev packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxt-dev libxrender-dev libxext-dev \
            libxcursor-dev p7zip-full

      - name: Install 7zip (macOS)
        if: runner.os == 'macOS'
        run: brew install p7zip

      # VTK's Java build has jar-timing handling that ONLY activates under the
      # Ninja generator (see Wrapping/Java/CMakeLists.txt: the vtkjava_jar
      # custom target is guarded by `if (CMAKE_GENERATOR MATCHES "Ninja")`).
      # Under the Visual Studio generator, INSTALL.vcxproj races vtk.jar
      # creation and fails with the paradoxical "cannot find ...: File exists".
      # So on Windows we build with Ninja + MSVC instead of the VS generator.
      # This step puts cl.exe/link.exe on PATH for the whole job.
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Install sccache + wire it to the GHA cache backend. Before Configure so
      # it's on PATH when the CMAKE_*_COMPILER_LAUNCHER flags reference it.
      # (Currently low hit-rate on VTK — see the SCCACHE_* env note above.)
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure
        shell: bash
        run: |
          # On Windows use Ninja (see MSVC setup step above for why). Ninja is
          # preinstalled on GitHub Windows runners. Ninja is single-config, so
          # CMAKE_BUILD_TYPE drives the config there; the VS-style --config is
          # harmless-but-ignored under Ninja and used by multi-config elsewhere.
          GEN_ARGS=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            GEN_ARGS="-G Ninja"
          fi
          cmake -B build -S . $GEN_ARGS \
            -DVTK_BUILD_SHARED_LIBS=ON \
            -DVTK_ENABLE_KITS=ON \
            -DVTK_WRAP_JAVA=ON \
            -DVTK_JAVA_JOGL_COMPONENT=ON \
            -DJOGL_VERSION="${JOGL_VERSION}" \
            -DJOGL_EXTRA_VERSIONS="${JOGL_VERSION}" \
            -DJava_JAR_PATHS="${GITHUB_WORKSPACE}/jogl" \
            -DCMAKE_BUILD_TYPE=Release \
            -DVTK_BUILD_TESTING=OFF \
            -DVTK_BUILD_EXAMPLES=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_GROUP_ENABLE_StandAlone=YES \
            -DVTK_GROUP_ENABLE_Rendering=WANT \
            -DVTK_GROUP_ENABLE_Imaging=WANT \
            -DVTK_GROUP_ENABLE_Views=DONT_WANT \
            -DVTK_GROUP_ENABLE_Web=DONT_WANT \
            -DVTK_GROUP_ENABLE_Qt=DONT_WANT \
            -DVTK_GROUP_ENABLE_Parallel=DONT_WANT \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install_root" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded \
            -DCMAKE_POLICY_DEFAULT_CMP0141=NEW

      # Fail loudly if the dependent-option silently forced kits OFF (which
      # happens if VTK_BUILD_SHARED_LIBS didn't take). Without this you'd only
      # notice by counting 150 JNI libs at the end.
      - name: Assert kits are enabled
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q "^VTK_ENABLE_KITS:BOOL=ON" build/CMakeCache.txt; then
            echo "FAIL: VTK_ENABLE_KITS is not ON in the cache — kits were" >&2
            echo "force-disabled (likely VTK_BUILD_SHARED_LIBS is OFF)." >&2
            grep -E "VTK_ENABLE_KITS|VTK_BUILD_SHARED_LIBS" build/CMakeCache.txt >&2 || true
            exit 1
          fi
          echo "OK: kits enabled."

      - name: Build and install
        shell: bash
        # Bound parallelism to core count. VTK is large; a bare -j can exhaust
        # RAM on the 16 GB runners and get OOM-killed (exit 143). nproc is
        # Linux/Git-Bash; macOS uses sysctl; fall back to a constant.
        run: |
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)
          cmake --build build --target install --config Release -j "$JOBS"

      - name: sccache stats
        shell: bash
        run: sccache --show-stats

      # Diagnostic: how many native libs did we actually produce? With kits on
      # this should be a small number (~9 kit JNI libs + a few unkitted +
      # bundled third-party), NOT ~150. Printed for visibility, not gated hard
      # (the exact count shifts with the module set).
      - name: Report native library count
        shell: bash
        run: |
          set -euo pipefail
          echo "=== JNI wrapper libs (*Java.*) ==="
          find install_root build \( -name '*Java.so' -o -name '*Java.so.*' \
            -o -name '*Java.dylib' -o -name '*Java.jnilib' -o -name '*Java.dll' \) \
            2>/dev/null | sort || true
          echo "=== all native libs under install_root ==="
          find install_root \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' \
            -o -name '*.dll' \) 2>/dev/null | wc -l
          echo "=== vtk.jar ==="
          find install_root build -name 'vtk.jar' 2>/dev/null || true

      # JNI-symbol presence gate — the Route-A analogue of your CoolProp JSON
      # symbol-leak gate. Whole-program consolidation (kits here) can silently
      # drop the Java_vtk_* entry points if link visibility is wrong; if they're
      # gone the jar loads but every native call throws UnsatisfiedLinkError at
      # runtime. Assert at least one kit JNI lib actually exports Java_ symbols.
      # nm-based → ELF/Mach-O only; Windows PE is skipped (same as your gate).
      - name: JNI symbol presence gate (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # Name-agnostic: find ANY JNI wrapper lib rather than assuming kit or
          # module names. VTK names JNI libs "<library_name>Java" and emits one
          # per wrapped module; extension is .so on Linux, .dylib or .jnilib on
          # macOS. We just need one that exports Java_* entry points to prove
          # the wrapper linkage is intact.
          #
          # NOTE: no `mapfile`/`readarray` here — those are Bash 4+ builtins and
          # macOS ships Bash 3.2. We collect matches into a plain loop instead,
          # counting and summing as we go, so it runs on both Bash versions.
          found=0
          total=0
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            found=$((found + 1))
            # nm format differs by platform:
            #   Linux (GNU nm):  "<addr> T Java_vtk..."   -D lists dynamic syms
            #   macOS (LLVM nm): "<addr> T _Java_vtk..."  Mach-O prepends '_',
            #                     and -D is not a macOS flag.
            # Use ONE nm invocation (fallback chain, not concatenation — running
            # two and concatenating would double-count). Match a 'T' text symbol
            # named Java_ OR _Java_ (optional leading underscore) so one pattern
            # works on both platforms.
            syms=$(nm -D "$lib" 2>/dev/null) || syms=""
            [ -n "$syms" ] || syms=$(nm -g "$lib" 2>/dev/null) || syms=""
            [ -n "$syms" ] || syms=$(nm "$lib" 2>/dev/null) || syms=""
            c=$(printf '%s\n' "$syms" | grep -Ec ' T _?Java_' || true)
            printf "  %-60s %s Java_ symbols\n" "$(basename "$lib")" "$c"
            total=$((total + c))
          done < <(find install_root build \
                     \( -name '*Java.so' -o -name '*Java.so.*' \
                        -o -name '*Java.dylib' -o -name '*Java.jnilib' \) \
                     -type f 2>/dev/null | sort -u)

          if [ "$found" -eq 0 ]; then
            echo "FAIL: no *Java JNI wrapper libs found at all." >&2
            echo "--- everything named *Java* under install_root/build ---" >&2
            find install_root build -name '*Java*' 2>/dev/null | head -50 >&2 || true
            echo "--- all native libs ---" >&2
            find install_root build \( -name '*.so' -o -name '*.so.*' \
              -o -name '*.dylib' -o -name '*.jnilib' \) 2>/dev/null | head -50 >&2 || true
            exit 1
          fi

          echo "Found $found JNI wrapper lib(s)."
          echo "Total Java_ entry points across all JNI libs: $total"
          if [ "$total" -eq 0 ]; then
            echo "FAIL: JNI libs exist but export no Java_* entry points —" >&2
            echo "native calls would throw UnsatisfiedLinkError at runtime." >&2
            exit 1
          fi
          echo "OK: JNI entry points present."

      # Runtime smoke test: proves the native libs actually LOAD and RUN in a
      # JVM, not just that they built and export symbols. Compiles a tiny Java
      # class against vtk.jar and runs it with -Dvtk.lib.dir pointing at the
      # per-platform native dir (lib/java/vtk-<System>-<Processor>). VTK's own
      # loader then loads by absolute path and patches java.library.path so
      # sibling deps resolve — no per-OS LD_LIBRARY_PATH/DYLD/ PATH juggling.
      #
      # Runs on ALL THREE platforms (bash is available on Windows via Git-Bash).
      # This deliberately tests library soundness in the friendly flat-dir CI
      # case; it is NOT a test of downstream NetBeans-style loading logic.
      - name: Runtime smoke test
        shell: bash
        run: |
          set -euo pipefail

          # Discover vtk.jar and the single per-platform native dir, rather than
          # hardcoding names that vary by OS/arch (vtk-Linux-x86_64 /
          # vtk-Darwin-arm64 / vtk-Windows-AMD64 ...).
          #
          # There can be MORE THAN ONE vtk.jar (build/ and install_root/), and
          # on some platforms one copy can be truncated/incomplete ("zip END
          # header not found"). So don't just take head -1 — pick the first
          # candidate that is a VALID, non-empty zip.
          libdir=$(find install_root build -type d -name 'vtk-*-*' 2>/dev/null \
                   | grep -E '/java/vtk-[^/]+-[^/]+$' | head -1)

          echo "=== all vtk.jar candidates (size shown) ==="
          find install_root build -name 'vtk.jar' -type f 2>/dev/null \
            -exec ls -l {} \; || true

          jar=""
          while IFS= read -r cand; do
            [ -n "$cand" ] || continue
            # Must be non-empty AND a valid zip. `unzip -t` (or jar tf) fails on
            # a truncated jar with exactly the "END header not found" error we
            # saw on macOS. Prefer the first that passes.
            if [ -s "$cand" ] && unzip -qt "$cand" >/dev/null 2>&1; then
              jar="$cand"
              break
            else
              echo "  SKIP (invalid/empty zip): $cand"
            fi
          done < <(find install_root build -name 'vtk.jar' -type f 2>/dev/null)

          if [ -z "$jar" ] || [ -z "$libdir" ]; then
            echo "FAIL: no VALID vtk.jar (or no native dir) found." >&2
            echo "  jar='$jar' libdir='$libdir'" >&2
            echo "--- jar candidates ---" >&2
            find install_root build -name 'vtk.jar' 2>/dev/null -exec ls -l {} \; >&2 || true
            echo "--- native dirs ---" >&2
            find install_root build -type d -name 'vtk-*' 2>/dev/null >&2 || true
            exit 1
          fi
          echo "Using jar:    $jar"
          echo "Using libdir: $libdir"

          # Classpath separator differs: ';' on Windows, ':' elsewhere.
          case "$RUNNER_OS" in
            Windows) SEP=';' ;;
            *)       SEP=':' ;;
          esac

          # --- Windows inter-DLL dependency resolution ---
          # On Windows, System.load() finds the named DLL, but Windows resolves
          # THAT DLL's dependencies (vtkRenderingCore-9.6.dll etc.) via the
          # standard DLL search order, which does NOT include the loaded DLL's
          # own directory and does NOT consult java.library.path. It DOES
          # include PATH. The C++ DLLs install to bin/ and the JNI DLLs to
          # lib/java/vtk-*, so we must put BOTH on PATH or the JNI DLL loads but
          # its siblings can't be found ("Can't find dependent libraries").
          # (Linux/macOS don't need this: the loader patches java.library.path /
          # uses @rpath + already-loaded images.) This mirrors what the Pyrus
          # installer does with SetDllDirectoryA.
          if [ "$RUNNER_OS" = "Windows" ]; then
            bindir=$(find install_root -type d -name bin 2>/dev/null | head -1)
            echo "Prepending to PATH: $libdir ; $bindir"
            export PATH="${libdir};${bindir};${PATH}"
          fi

          # Compile the smoke test against vtk.jar, then run it. The test lives
          # in the repo at .github/smoke/VtkSmokeTest.java (default package).
          src=".github/smoke/VtkSmokeTest.java"
          mkdir -p smoke-out
          javac -cp "$jar" -d smoke-out "$src"

          echo "=== running smoke test ==="
          # --enable-native-access=ALL-UNNAMED silences the Java 25 "restricted
          # method Runtime::load" warning (which becomes a hard error in a
          # future JDK). vtk.jar is an unnamed module, hence ALL-UNNAMED.
          java --enable-native-access=ALL-UNNAMED \
            -cp "smoke-out${SEP}${jar}" -Dvtk.lib.dir="$libdir" VtkSmokeTest

      # FLATTEN native libraries into a single clean directory per platform.
      #
      # Problem this solves: VTK installs versioned libs as a symlink chain
      #   libvtkcgns-9.6.so       -> ...so.1      (linker/dev name)
      #   libvtkcgns-9.6.so.1     -> ...so.9.6    (SONAME — what the loader wants)
      #   libvtkcgns-9.6.so.9.6                   (the real file)
      # actions/upload-artifact DEREFERENCES symlinks, turning that into THREE
      # full copies (the 3x bloat: Linux 706 MB, macOS 603 MB). We instead keep
      # exactly ONE real file per library, named as its advertised runtime name:
      #   * Linux: the SONAME      (readelf -d ... SONAME)
      #   * macOS: the install name basename (otool -D)
      #   * JNI libs have no SONAME/install-name -> keep their own filename.
      # This is Option B: CI emits precisely what Pyrus consumes, one file each.
      #
      # Windows has NO symlink scheme (each DLL is a single versioned file), so
      # we just copy the DLLs as-is.
      #
      # Runs while the symlink structure is still intact (BEFORE upload), and
      # gathers from BOTH lib dirs: the C++/third-party libs (lib/) and the JNI
      # wrapper libs (lib/java/vtk-<platform>/), plus vtk.jar.
      # ----------------------------------------------------------------------
      - name: Flatten native libraries
        shell: bash
        run: |
          set -euo pipefail
          out="dist-native"
          mkdir -p "$out"

          # advertised_name <file> -> echoes the runtime name to keep it under.
          advertised_name () {
            local f="$1" name=""
            if [ "$RUNNER_OS" = "macOS" ]; then
              # otool -D prints a header line then the install name; take the
              # last non-empty line and strip any @rpath/ (or path) prefix.
              local instname
              instname=$(otool -D "$f" 2>/dev/null | tail -1 || true)
              if [ -n "$instname" ] && [ "$instname" != "$f:" ]; then
                name=$(basename "$instname")
              fi
            else
              # Linux: SONAME if present.
              name=$(readelf -d "$f" 2>/dev/null | grep SONAME \
                     | sed -E 's/.*\[(.*)\].*/\1/' || true)
            fi
            # Fallback: no SONAME/install-name (e.g. JNI libs) -> own basename.
            [ -n "$name" ] || name=$(basename "$f")
            printf '%s' "$name"
          }

          copy_real_libs () {
            # $1 = dir to scan, $2... = find name-patterns
            local dir="$1"; shift
            [ -d "$dir" ] || return 0
            # -type f => real files only, skipping the symlinks automatically.
            find "$dir" -maxdepth 1 -type f \( "$@" \) 2>/dev/null \
            | while IFS= read -r real; do
                [ -n "$real" ] || continue
                local target
                target=$(advertised_name "$real")
                # De-dup: if two real files advertise the same name, first wins
                # (shouldn't happen, but guard against overwrites).
                if [ -e "$out/$target" ]; then
                  echo "  (skip dup) $(basename "$real") -> $target already present"
                else
                  cp "$real" "$out/$target"
                  echo "  $(basename "$real") -> $target"
                fi
              done
          }

          echo "=== flattening C++/third-party libs (lib/) ==="
          if [ "$RUNNER_OS" = "Windows" ]; then
            copy_real_libs "install_root/bin" -name '*.dll'   # Windows DLLs live in bin/
            copy_real_libs "install_root/lib" -name '*.dll'
          elif [ "$RUNNER_OS" = "macOS" ]; then
            copy_real_libs "install_root/lib" -name '*.dylib' -o -name '*.dylib.*'
          else
            copy_real_libs "install_root/lib" -name '*.so' -o -name '*.so.*'
          fi

          echo "=== flattening JNI wrapper libs (lib/java/vtk-*) ==="
          jnidir=$(find install_root -type d -path '*/java/vtk-*-*' 2>/dev/null | head -1)
          if [ -n "$jnidir" ]; then
            if [ "$RUNNER_OS" = "Windows" ]; then
              copy_real_libs "$jnidir" -name '*.dll'
            elif [ "$RUNNER_OS" = "macOS" ]; then
              copy_real_libs "$jnidir" -name '*.dylib' -o -name '*.dylib.*' -o -name '*.jnilib'
            else
              copy_real_libs "$jnidir" -name '*.so' -o -name '*.so.*'
            fi
          fi

          # vtk.jar alongside (validated copy — reuse the same integrity check).
          jar=""
          while IFS= read -r cand; do
            [ -n "$cand" ] || continue
            if [ -s "$cand" ] && unzip -qt "$cand" >/dev/null 2>&1; then jar="$cand"; break; fi
          done < <(find install_root build -name 'vtk.jar' -type f 2>/dev/null)
          if [ -z "$jar" ]; then
            echo "FAIL: no valid vtk.jar to include in the flattened output." >&2
            exit 1
          fi
          cp "$jar" "$out/vtk.jar"

          echo "=== flattened output ==="
          ls -la "$out"
          echo "file count: $(find "$out" -type f | wc -l)"
          echo "total size: $(du -sh "$out" | cut -f1)"

      - name: Upload per-OS artifact
        uses: actions/upload-artifact@v7
        with:
          name: vtk-perOS-${{ matrix.sysname }}
          # Upload only the FLATTENED native dir (one real file per library +
          # vtk.jar), not the whole install_root — that's what dedups the 3x
          # symlink bloat and is exactly what Pyrus consumes.
          path: dist-native

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Download per-OS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vtk-perOS-*
          path: staging

      # Assemble the Pyrus-ready distribution tree:
      #   dist/vtk.jar             (platform-independent Java classes; one copy)
      #   dist/windows/*.dll       (flattened native libs, one real file each)
      #   dist/linux/*.so*
      #   dist/darwin/*.dylib
      # Folder names are the OS tokens Pyrus's Installer expects. The per-OS
      # artifacts are ALREADY flattened (one real file per lib) by the build
      # job, so here we just place them under the right OS folder and lift out
      # the single shared vtk.jar.
      - name: Assemble unified distribution
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Map the matrix sysname (used in the artifact name) to the Pyrus OS
          # folder token.
          os_token () {
            case "$1" in
              Linux)   echo linux ;;
              Darwin)  echo darwin ;;
              Windows) echo windows ;;
              *) echo "UNKNOWN_$1" ;;
            esac
          }

          jar_hash=""
          for d in staging/vtk-perOS-*/; do
            sys="${d#staging/vtk-perOS-}"; sys="${sys%/}"
            token=$(os_token "$sys")
            echo "=== $sys -> dist/$token ==="

            # Lift out the single shared vtk.jar (identical across platforms);
            # warn if a later platform's jar differs (module-set mismatch).
            found_jar=$(find "$d" -name 'vtk.jar' -type f | head -1 || true)
            if [ -n "$found_jar" ]; then
              h=$(sha256sum "$found_jar" | cut -d' ' -f1)
              if [ -z "$jar_hash" ]; then
                jar_hash="$h"; cp "$found_jar" dist/vtk.jar
              elif [ "$h" != "$jar_hash" ]; then
                echo "WARN: vtk.jar from $sys differs from the first one." >&2
              fi
            fi

            # Everything except the jar is a native lib -> OS folder.
            mkdir -p "dist/$token"
            find "$d" -type f ! -name 'vtk.jar' -exec cp {} "dist/$token/" \;
          done

          echo "=== assembled Pyrus-ready distribution ==="
          find dist -type f | sort
          echo "=== per-platform summary ==="
          [ -f dist/vtk.jar ] && echo "vtk.jar: present ($(du -h dist/vtk.jar | cut -f1))"
          for p in dist/*/; do
            [ -d "$p" ] || continue
            printf "%s: %d libs, %s\n" "$(basename "$p")" \
              "$(find "$p" -type f | wc -l)" "$(du -sh "$p" | cut -f1)"
          done

      - name: Upload unified VTK Java artifact
        uses: actions/upload-artifact@v7
        with:
          name: vtk-java-all-platforms
          path: dist

      - name: Delete intermediate per-OS artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: vtk-perOS-*

